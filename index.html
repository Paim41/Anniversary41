<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Happy Anniversary Sayang</title>
<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Special+Elite&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Anti-devtools protection -->
<script>
(function(){
  document.addEventListener('contextmenu',function(e){e.preventDefault();});
  document.addEventListener('keydown',function(e){
    if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&'IJCK'.includes(e.key))||(e.ctrlKey&&'US'.includes(e.key))){e.preventDefault();return false;}
  });
  setInterval(function(){
    var d=(window.outerWidth-window.innerWidth>160)||(window.outerHeight-window.innerHeight>160);
    document.body.style.filter=d?'blur(30px)':'';
    document.body.style.pointerEvents=d?'none':'';
  },900);
})();
</script>

<!-- Loading -->
<div id="LS">
  <div class="bunny-container">
    <div class="text"></div>
    <div class="grass"></div>
    <div class="bunny">
      <div class="bunny__ears">
        <div class="bunny__ear bunny__ear--left"></div>
        <div class="bunny__ear bunny__ear--right"></div>
      </div>
      <div class="bunny__feet">
        <div class="bunny__foot bunny__foot--left"></div>
        <div class="bunny__foot bunny__foot--right"></div>
      </div>
      <div class="bunny__tail"></div>
      <div class="bunny__paw"></div>
      <div class="bunny__body">
        <div class="bunny__eyes"></div>
        <div class="bunny__nose"></div>
        <div class="bunny__cheeks"></div>
        <div class="bunny__mouth"></div>
      </div>
    </div>
  </div>
</div>

<!-- Music -->
<div id="MB" onclick="toggleMusic()" title="Play / Pause">
  <svg id="IP" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
  <svg id="IPA" viewBox="0 0 24 24" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
</div>

<canvas id="RC"></canvas>

<!-- Countdown -->
<div id="CD">
  <canvas id="CDC"></canvas>
  <div id="CDN">3</div>
  <div id="CDL">get ready...</div>
</div>

<!-- Anniversary Words (dot-matrix) -->
<div id="HBW">
  <canvas id="HBBC"></canvas>
  <canvas id="HBC"></canvas>
</div>

<!-- Reveal screen -->
<div id="RV">
  <canvas id="RVC2"></canvas>
  <div id="RVM">
    <div id="RVT">Happy Anniversary</div>
    <div id="RVN">Sayang</div>
    <div id="RVS">Every moment with you is my favourite memory.</div>
    <button id="RVBTN" onclick="showBook()">Open Your Gift</button>
  </div>
</div>

<!-- Main content -->
<div id="MC">

  <!-- Welcome card -->
  <div id="WC">
    <h1>Happy Anniversary Sayang!</h1>
    <button class="bb" onclick="startExp()">
      <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>Begin
    </button>
  </div>

  <!-- Typewriter headline -->
  <div id="HW"><div id="HL"></div></div>

  <!-- Scrapbook flipbook -->
  <div id="BS">
    <div id="book-wrap">
      <div id="flipbook">
        <!-- Hard front cover -->
        <div class="hard">
          <div class="cover-inner">
            <div class="cover-rings">
              <svg viewBox="0 0 24 24"><circle cx="9" cy="12" r="7"/><circle cx="15" cy="12" r="7"/></svg>
            </div>
            <div class="cover-title">Our Story</div>
            <div class="cover-sub">A scrapbook of us</div>
          </div>
        </div>
        <!-- Hard front cover inside (blank) -->
        <div class="hard"></div>
        <!-- Content pages are injected here by JS (buildFlipbook in main.js) -->
        <!-- Hard back cover inside (blank) -->
        <div class="hard"></div>
        <!-- Hard back cover -->
        <div class="hard">
          <div class="cover-inner">
            <div class="cover-heart">
              <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            </div>
            <div class="cover-title">The End</div>
            <div class="cover-sub">Thank you for being mine</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Love Gallery -->
  <div id="LG">
    <div class="lg-title">To my one and only.”</div>
    <div id="LW"></div>
    <div class="lg-msg">Happy Anniversary Sayang!</div>
  </div>

</div>

<!-- Libraries (do not edit) -->
<script src="jquery.min.js"></script>
<script src="turn.js"></script>

<!-- Your app logic — edit main.js to change photos, captions, text -->
<script src="main.js"></script>

</body>
</html>
